<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Phoenix-Fall</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="assets/icon.png">
  <script>
    (function() {
      console.log('🚀 [' + 'phoenix-fall' + '] Client script active.');
      if (window.parent !== window) {
        console.log('🚀 [' + 'phoenix-fall' + '] Embedded in iframe. Sending handshake...');
        window.parent.postMessage({ type: 'CHECK_IN', project: 'phoenix-fall' }, '*');
      } else {
        console.log('🚀 [' + 'phoenix-fall' + '] Running standalone.');
      }
    })();
  </script>
  
</head>
<body class="bg-slate-50">
  <app-root></app-root>
</body>
</html>
